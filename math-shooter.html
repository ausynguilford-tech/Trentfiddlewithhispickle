<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Math Shooter Game</title>\n    <style>\n        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; margin: 0; }\n        canvas { border: 1px solid black; }\n        #retry { display: none; }\n    </style>\n</head>\n<body>\n    <canvas id='gameCanvas' width='800' height='600'></canvas>\n    <button id='retry'>Retry</button>\n    <script>\n        const canvas = document.getElementById('gameCanvas');\n        const ctx = canvas.getContext('2d');\n        let score = 0;\n        let highScore = localStorage.getItem('highScore') || 0;\n        let player = { x: canvas.width / 2, y: canvas.height - 30 };\n        let enemies = [];\n        let questions = [];\n        let gameOver = false;\n\n        function init() {\n            document.getElementById('retry').style.display = 'none';\n            score = 0;\n            enemies = [];\n            questions = generateQuestions();\n            gameOver = false;\n            animate();\n        }\n\n        function generateQuestions() {\n            let questions = [];\n            for (let i = 0; i < 5; i++) {\n                let num1 = Math.floor(Math.random() * 10) + 1;\n                let num2 = Math.floor(Math.random() * 10) + 1;\n                questions.push({\n                    question: `${num1} x ${num2}?`,\n                    answer: num1 * num2\n                });\n            }\n            return questions;\n        }\n\n        function spawnEnemy() {\n            const enemy = { x: Math.random() * canvas.width, y: 0 };\n            enemies.push(enemy);\n        }\n\n        function drawPlayer() {\n            ctx.fillStyle = 'blue';\n            ctx.fillRect(player.x, player.y, 20, 20);\n        }\n\n        function drawEnemies() {\n            ctx.fillStyle = 'red';\n            enemies.forEach((enemy) => {\n                ctx.fillRect(enemy.x, enemy.y, 20, 20);\n            });\n        }\n\n        function drawScore() {\n            ctx.fillStyle = 'black';\n            ctx.fillText(`Score: ${score}`, 10, 20);\n            ctx.fillText(`High Score: ${highScore}`, 10, 40);\n        }\n\n        function shoot() {\n            const currentQuestion = questions[score];\n            const userAnswer = prompt(currentQuestion.question);\n            if (parseInt(userAnswer) === currentQuestion.answer) {\n                score++;\n                if (score > highScore) {\n                    highScore = score;\n                    localStorage.setItem('highScore', highScore);\n                }\n            } else {\n                gameOver = true;\n            }\n        }\n\n        function animate() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawPlayer();\n            drawEnemies();\n            drawScore();\n            if (!gameOver) {\n                requestAnimationFrame(animate);\n                spawnEnemy();\n                enemies.forEach((enemy) => {\n                    enemy.y += 2;\n                    if (enemy.y > canvas.height) {\n                        gameOver = true;\n                    }\n                });\n                if (score < questions.length) {\n                    setTimeout(shoot, 2000);\n                } else {\n                    gameOver = true;\n                }\n            } else {\n                ctx.fillText('Game Over!', canvas.width / 2 - 40, canvas.height / 2);\n                document.getElementById('retry').style.display = 'block';\n            }\n        }\n\n        document.getElementById('retry').addEventListener('click', init);\n        init();\n    </script>\n</body>\n</html>
